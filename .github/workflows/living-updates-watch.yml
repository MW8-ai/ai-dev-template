name: Living Updates Watch

on:
  schedule:
    - cron: "20 9 * * 1"
  workflow_dispatch:

# Required repo setting: Settings → Actions → General →
# "Allow GitHub Actions to create and approve pull requests" must be enabled.
permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  watch:
    name: Watch platform updates and open review PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run living updates watcher
        id: watcher
        run: |
          output=$(python scripts/living_updates_watch.py --max-new 10)
          echo "$output"
          count=$(echo "$output" | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")
          echo "new_count=$count" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request if updates were detected
        if: steps.watcher.outputs.new_count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: add detected living update notes"
          title: "docs: review detected platform updates"
          body: |
            ## Summary
            This automated PR detected platform updates from the Living Updates source registry.

            Review generated files under `docs/06-living-updates/incoming/`.

            Decide whether to convert to an impact note, update docs, update AI guardrails, update CI/CD guidance, or archive with no action.

            Automation watches. Humans decide. Docs evolve.
          branch: automation/living-updates
          delete-branch: true
          labels: |
            type: documentation
            automation
            needs review
