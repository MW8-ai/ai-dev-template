name: 04 CodeQL Security Analysis

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '37 11 * * 2'
  workflow_dispatch:

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  detect-code:
    name: Detect supported source files
    runs-on: ubuntu-latest
    outputs:
      has_javascript: ${{ steps.detect.outputs.has_javascript }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect JavaScript or TypeScript files
        id: detect
        shell: bash
        run: |
          if find . \
            -path './.git' -prune -o \
            -path './node_modules' -prune -o \
            -path './examples/**/node_modules' -prune -o \
            -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' \) \
            -print -quit | grep -q .; then
            echo "has_javascript=true" >> "$GITHUB_OUTPUT"
            echo "Supported JavaScript/TypeScript source files found."
          else
            echo "has_javascript=false" >> "$GITHUB_OUTPUT"
            echo "No JavaScript/TypeScript source files found. Skipping CodeQL analysis for this documentation-focused repository."
          fi

  analyze:
    name: CodeQL analyze
    needs: detect-code
    if: needs.detect-code.outputs.has_javascript == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  no-supported-code:
    name: No supported source files
    needs: detect-code
    if: needs.detect-code.outputs.has_javascript != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: |
          echo "CodeQL is configured, but no JavaScript/TypeScript source files were found."
          echo "This is expected for a documentation/template repository."
          echo "The workflow passes so the badge reflects a healthy skipped state instead of a false failure."
