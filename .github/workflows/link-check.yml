name: Link Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links in all markdown files
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --config .lychee.toml
            --verbose
            --no-progress
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
