name: AI Review Reminder

on:
  pull_request:
    types:
      - opened
      - reopened

jobs:
  post-ai-review-reminder:
    name: Post AI Human-Review Reminder
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Post AI review reminder comment
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const MARKER = '<!-- ai-review-reminder -->';

            // Fetch existing comments to avoid posting duplicates
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const alreadyPosted = comments.data.some(
              (comment) => comment.body && comment.body.includes(MARKER)
            );

            if (alreadyPosted) {
              console.log('AI review reminder already posted on this PR. Skipping.');
            } else {
              const body = `${MARKER}
            ## AI-Assisted Code Review Reminder

            Thank you for opening this pull request!

            **AI tools are encouraged** in this project — they help us move faster and write better code. However, the following policy applies to all PRs:

            > **All AI-generated or AI-assisted code must be reviewed by a human before merging.**

            ### What this means for reviewers:

            - Read through the diff carefully — do not approve based on passing CI alone.
            - Verify that AI suggestions are correct, secure, and consistent with our architecture.
            - Check for hallucinated imports, incorrect logic, or placeholder content that was not filled in.
            - Confirm that tests cover the changed behaviour, not just the lines of code.

            ### Resources

            - Human-in-the-loop review guidelines: \`docs/04-ai-workflows/HUMAN_IN_LOOP.md\`
            - AI workflow overview: \`docs/04-ai-workflows/AI_OVERVIEW.md\`
            - Code review process: \`docs/03-development-workflow/CODE_REVIEW.md\`

            ---

            _This comment is posted automatically on every new PR. It is advisory only and does not block merging._
            `;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });

              console.log(`Posted AI review reminder on PR #${prNumber}.`);
            }

            // Always exit 0 — this check is advisory only
            process.exit(0);
