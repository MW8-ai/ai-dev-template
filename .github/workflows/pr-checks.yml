name: PR Checks

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-description-check:
    name: PR Description Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check PR description length
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const minLength = 20;

            const stripped = body.replace(/\s+/g, ' ').trim();

            if (stripped.length < minLength) {
              core.setFailed(
                `PR description is too short or empty. ` +
                `Please provide a meaningful description of at least ${minLength} characters. ` +
                `Current length: ${stripped.length} characters.`
              );
            } else {
              console.log(`PR description check passed. Length: ${stripped.length} characters.`);
            }

  hotfix-branch-check:
    name: Hotfix Branch Policy Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check hotfix branch targeting main
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const headBranch = pr.head.ref;
            const baseBranch = pr.base.ref;
            const labels = pr.labels.map(l => l.name);

            const isHotfix = headBranch.startsWith('hotfix');
            const targetingMain = baseBranch === 'main';
            const hasApprovalLabel = labels.includes('hotfix-approved');

            if (isHotfix && targetingMain && !hasApprovalLabel) {
              core.setFailed(
                `Hotfix branches targeting 'main' require the 'hotfix-approved' label before merging. ` +
                `Branch: ${headBranch} → ${baseBranch}. ` +
                `Please have a maintainer review and add the 'hotfix-approved' label.`
              );
            } else if (isHotfix && targetingMain && hasApprovalLabel) {
              console.log(`Hotfix branch '${headBranch}' targeting main has the required 'hotfix-approved' label.`);
            } else {
              console.log(`Branch policy check passed. Branch: ${headBranch} → ${baseBranch}`);
            }

  pr-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs:
      - pr-description-check
      - hotfix-branch-check
    if: always()

    steps:
      - name: Print check summary
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const headBranch = pr.head.ref;
            const baseBranch = pr.base.ref;
            const bodyLength = (pr.body || '').replace(/\s+/g, ' ').trim().length;
            const labels = pr.labels.map(l => l.name).join(', ') || '(none)';

            const descStatus = '${{ needs.pr-description-check.result }}';
            const hotfixStatus = '${{ needs.hotfix-branch-check.result }}';

            console.log('=== PR Checks Summary ===');
            console.log(`PR #${pr.number}: ${pr.title}`);
            console.log(`Branch: ${headBranch} → ${baseBranch}`);
            console.log(`Description length: ${bodyLength} characters`);
            console.log(`Labels: ${labels}`);
            console.log('');
            console.log('Check Results:');
            console.log(`  1. PR Description (>=20 chars): ${descStatus}`);
            console.log(`  2. Hotfix Branch Policy:        ${hotfixStatus}`);
            console.log('');

            if (descStatus === 'success' && hotfixStatus === 'success') {
              console.log('All PR checks passed.');
            } else {
              console.log('One or more PR checks failed. See individual job logs for details.');
            }
