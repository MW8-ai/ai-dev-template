name: Secret File Guard

on:
  pull_request:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Block common secret files
        run: |
          echo "Checking for risky secret/config files..."

          risky_files=$(find . -type f \( \
            -name ".env" -o \
            -name ".env.*" -o \
            -name "*.pem" -o \
            -name "*.key" -o \
            -name "id_rsa" -o \
            -name "id_ed25519" \
          \) | sed 's#^\./##')

          if [ -n "$risky_files" ]; then
            echo "Potential secret files found:"
            echo "$risky_files"
            echo "Do not commit secrets. Use GitHub Secrets, Azure Key Vault, or approved secret storage."
            exit 1
          fi

          echo "No common secret files found."
