version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /examples/enterprise-project
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - example
    commit-message:
      prefix: chore
      include: scope
