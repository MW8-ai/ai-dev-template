# Living update source registry.
#
# Each source is fetched weekly. New items not in seen-updates.json are written
# to docs/06-living-updates/incoming/ for human review.
#
# type: rss   → parsed as RSS/Atom feed
# type: webpage → hash-based change detection on the full page
#
# include_keywords: if set, only items whose title+summary+link contain at
# least one keyword (case-insensitive) are filed. Leave empty to file all items.

sources:

  # ---------------------------------------------------------------------------
  # GITHUB
  # ---------------------------------------------------------------------------

  - id: github-changelog
    vendor: GitHub
    category: dev-platform
    url: https://github.blog/changelog/feed/
    type: rss
    priority: high
    tags: [github, pull-requests, actions, codespaces, copilot, security]
    include_keywords:
      - pull request
      - files changed
      - GitHub Actions
      - Codespaces
      - Copilot
      - secret scanning
      - code scanning
      - branch protection
      - repository rules
      - rulesets
      - merge queue
      - security
      - Models
      - Spark

  - id: github-blog
    vendor: GitHub
    category: dev-platform
    url: https://github.blog/feed/
    type: rss
    priority: medium
    tags: [github, announcements, ai, copilot]
    include_keywords:
      - Copilot
      - AI
      - model
      - agent
      - Actions
      - security
      - enterprise

